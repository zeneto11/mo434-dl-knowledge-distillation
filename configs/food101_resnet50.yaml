dataset:
  name: food101
  root: data
  image_size: 224
  batch_size: 32
  num_workers: 4
  train_limit: null
  val_limit: null
  test_limit: null
teacher:
  name: resnet50
  stage1_epochs: 30
  stage2_epochs: 15
  stage2_lr: 5.0e-5
training:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  alpha: 1.0
  beta: 1.0
  amp: true
  seed: 42
outputs:
  checkpoint_dir: checkpoints
  results_dir: results
